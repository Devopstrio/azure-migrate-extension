apiVersion: apps/v1
kind: Deployment
metadata:
  name: azure-migrate-api
  namespace: migrate-factory-prod
  labels:
    app: migrate-api
spec:
  replicas: 4
  selector:
    matchLabels:
      app: migrate-api
  template:
    metadata:
      labels:
        app: migrate-api
    spec:
      containers:
      - name: gateway
        image: acrmigrate.azurecr.io/devopstrio/azure-migrate-api:v1.0.0
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: migrate-secrets
              key: db-url
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: migrate-api-svc
  namespace: migrate-factory-prod
spec:
  selector:
    app: migrate-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: assessment-engine
  namespace: migrate-factory-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      component: assessment-engine
  template:
    metadata:
      labels:
        component: assessment-engine
    spec:
      containers:
      - name: worker
        image: acrmigrate.azurecr.io/devopstrio/assessment-engine:latest
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: migrate-ingress
  namespace: migrate-factory-prod
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: migrate.devopstrio.co.uk
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: migrate-api-svc
            port:
              number: 80
